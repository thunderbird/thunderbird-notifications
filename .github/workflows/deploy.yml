name: Deploy Notifications

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      deploy_envs: ${{ steps.changes.outputs.changes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            stage:
              - 'schema.json'
              - 'pulumi/**'
              - 'src/**'
              - '.github/workflows/**'
              - 'stage/yaml/**'
            prod:
              - 'schema.json'
              - 'pulumi/**'
              - 'src/**'
              - '.github/workflows/**'
              - 'prod/yaml/**'

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Convert YAML to JSON
        run: |
          uv run python scripts/convert_yaml.py stage/yaml stage/json/notifications.json
          uv run python scripts/convert_yaml.py prod/yaml prod/json/notifications.json

      - name: Validate JSON
        run: |
          uv run python scripts/validate_json.py ./schema.json stage/json
          uv run python scripts/validate_json.py ./schema.json prod/json

      - name: Upload JSON artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: notifications-json
          path: |
            stage/json/notifications.json
            prod/json/notifications.json

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.validate.outputs.deploy_envs != '[]' && needs.validate.outputs.deploy_envs != ''
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJson(needs.validate.outputs.deploy_envs) }}
    environment: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Download JSON artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: notifications-json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::768512802988:role/thunderbird-notifications-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate with Pulumi Cloud
        uses: pulumi/auth-actions@1c89817aab0c66407723cdef72b05266e7376640 # v1.0.1
        with:
          organization: thunderbird
          requested-token-type: urn:pulumi:token-type:access_token:organization

      - uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6.6.1
        with:
          command: up
          stack-name: thunderbird/thunderbird-notifications/${{ matrix.env }}
          work-dir: pulumi
